{% extends "base.html" %}
{% block title %}Ko'nikmalar — Saidbek Kamolov{% endblock %}

{% block extra_css %}
<style>
.skills-header{padding:80px 2rem 0;max-width:1100px;margin:0 auto}

.skills-filter{
  display:flex;gap:0.75rem;flex-wrap:wrap;
  margin-bottom:2.5rem;
}
.sf-btn{
  display:flex;align-items:center;gap:6px;
  font-family:'DM Mono',monospace;font-size:12px;
  padding:7px 18px;border-radius:100px;
  border:1px solid var(--border);
  background:transparent;color:var(--muted);
  cursor:pointer;transition:all 0.3s;
}
.sf-btn svg{width:13px;height:13px}
.sf-btn:hover,.sf-btn.active{
  background:var(--c1);color:var(--bg);border-color:var(--c1);
}

.skills-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:14px;
  padding:0 2rem 80px;
  max-width:1100px;margin:0 auto;
}
.skill-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:1.5rem 1rem;
  text-align:center;
  transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;overflow:hidden;cursor:default;
}
.skill-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at center,var(--gc,rgba(0,255,200,0.12)) 0%,transparent 70%);
  opacity:0;transition:opacity 0.3s;
}
.skill-card:hover{
  transform:translateY(-8px) scale(1.02);
  border-color:var(--gb,rgba(0,255,200,0.3));
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
}
.skill-card:hover::before{opacity:1}

.sk-icon{
  width:48px;height:48px;border-radius:14px;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 0.75rem;
  background:rgba(255,255,255,0.03);
  transition:border-color 0.3s;
}
.sk-icon svg{width:24px;height:24px}
.skill-card:hover .sk-icon{border-color:var(--gb,rgba(0,255,200,0.3))}
.skill-nm{font-size:13px;font-weight:700;margin-bottom:3px}
.skill-cat-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase}
.skill-bar{
  margin-top:10px;height:3px;border-radius:100px;
  background:rgba(255,255,255,0.07);overflow:hidden;
}
.skill-bar-fill{
  height:100%;border-radius:100px;
  transition:width 1s ease;
}
.skill-pct{
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--muted);margin-top:5px;
}

/* COLOR THEMES PER CATEGORY */
.cat-frontend .sk-icon svg{color:var(--c1)}
.cat-frontend{--gc:rgba(0,255,200,0.08);--gb:rgba(0,255,200,0.3)}
.cat-frontend .skill-bar-fill{background:var(--c1)}

.cat-backend .sk-icon svg{color:var(--c2)}
.cat-backend{--gc:rgba(123,94,167,0.08);--gb:rgba(123,94,167,0.3)}
.cat-backend .skill-bar-fill{background:var(--c2)}

.cat-design .sk-icon svg{color:var(--c3)}
.cat-design{--gc:rgba(255,79,110,0.08);--gb:rgba(255,79,110,0.3)}
.cat-design .skill-bar-fill{background:var(--c3)}

.cat-tools .sk-icon svg{color:var(--c4)}
.cat-tools{--gc:rgba(245,197,66,0.08);--gb:rgba(245,197,66,0.3)}
.cat-tools .skill-bar-fill{background:var(--c4)}

@media(max-width:480px){
  .skills-grid{grid-template-columns:repeat(2,1fr);gap:10px}
}
</style>
{% endblock %}

{% block content %}
<div class="skills-header">
  <div class="sec-label">// 02 — SKILLS</div>
  <h1 class="sec-title">Ko'nikmalar</h1>

  <div class="skills-filter">
    <button class="sf-btn active" data-cat="all">
      <i data-lucide="layout-grid"></i> Barchasi
    </button>
    <button class="sf-btn" data-cat="frontend">
      <i data-lucide="monitor"></i> Frontend
    </button>
    <button class="sf-btn" data-cat="backend">
      <i data-lucide="server"></i> Backend
    </button>
    <button class="sf-btn" data-cat="design">
      <i data-lucide="pen-tool"></i> Dizayn
    </button>
    <button class="sf-btn" data-cat="tools">
      <i data-lucide="wrench"></i> Toollar
    </button>
  </div>
</div>

<div class="skills-grid" id="skillsGrid">
  {% for s in skills %}
  <div class="skill-card cat-{{ s.cat }} fade-in" data-cat="{{ s.cat }}" style="transition-delay:{{ loop.index0 * 0.04 }}s">
    <div class="sk-icon">
      <i data-lucide="{{ s.icon }}"></i>
    </div>
    <div class="skill-nm">{{ s.name }}</div>
    <div class="skill-cat-lbl">{{ s.cat }}</div>
    <div class="skill-bar">
      <div class="skill-bar-fill" data-w="{{ s.level }}" style="width:0%"></div>
    </div>
    <div class="skill-pct">{{ s.level }}%</div>
  </div>
  {% endfor %}
</div>
{% endblock %}

{% block extra_js %}
<script>
// Filter buttons
document.querySelectorAll('.sf-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.sf-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    const cat = this.dataset.cat;
    document.querySelectorAll('.skill-card').forEach(card=>{
      if(cat==='all' || card.dataset.cat===cat){
        card.style.display='';
      } else {
        card.style.display='none';
      }
    });
    lucide.createIcons();
  });
});

// Animate bars when visible
const barObserver = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      const fill = e.target.querySelector('.skill-bar-fill');
      if(fill) fill.style.width = fill.dataset.w + '%';
    }
  });
},{threshold:0.2});
document.querySelectorAll('.skill-card').forEach(el=>barObserver.observe(el));
</script>
{% endblock %}
